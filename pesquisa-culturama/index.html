<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./culturama-favico.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap"
      rel="stylesheet"
    />

    <title>Document</title>
  </head>
  <body>
    <header>
      <img src="./img/logo-culturama.png" alt="Logo Culturama" width="200" />
      <h1>Pesquisa Culturama</h1>
    </header>
    <main>
      <section>
        <form action="" method="get">
          <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="name">Nome</label>
            <input type="text" id="name" name="userName" required />
            <br /><br />

            <label for="age">Idade</label>
            <input type="number" id="age" name="userAge" min="12" max="100" required/>
            <br/><br/>

            <label for="birthDate">Data de Nascimento</label>
            <input type="date" id="birthDate" name="userBirthDate"/>
            <br/><br/>

            <label for="email">Email</label>
            <input type="email" id="email" name="userEmail" required/>
            <br/><br/>

            <label for="image">Upload de Imagem</label>
            <input type="file" accept="image/*" id="image" name="userImage"/>
            <br/><br/>
          </fieldset>

          <fieldset>
            <legend>Perfil</legend>
            <p>Gênero:</p>
            <input type="radio" id="gender-fem" name="userGender" value="feminino"/>
            <label for="gender-fem">Feminino</label>

            <input type="radio" id="gender-masc" name="userGender" value="masculino"/>
            <label for="gender-masc">Masculino</label>

            <input type="radio" id="gender-naoInformado" name="userGender" value="notInformed"/>
            <label for="gender-naoInformado">Não Informado</label>
            <br/><br />

            <label for="maritalStatus">Estado Civil:</label>
            <select id="maritalStatus" name="userMaritalStatus">
              <option value="notInformed">Não Informado</option>
              <option value="casado">Casado</option>
              <option value="solteiro">Solteiro</option>
              <option value="divorciado">Divorciado</option>
              <option value="uniaoEstavel">União estável</option>
            </select>
            <br /><br />

            <label for="state">Estado:</label>
            <select id="state" name="userState">
              <option value="notInformed">Selecione ...</option>
              <option value="Acre">Acre</option>
              <option value="Alagoas">Alagoas</option>
              <option value="Amapá">Amapá</option>
              <option value="Amazonas">Amazonas</option>
              <option value="Bahia">Bahia</option>
              <option value="Ceará">Ceará</option>
              <option value="Distrito Federal">Distrito Federal</option>
              <option value="Espirito Santo">Espirito Santo</option>
              <option value="Goiás">Goiás</option>
              <option value="Maranhão">Maranhão</option>
              <option value="Mato Grosso do Sul">Mato Grosso do Sul</option>
              <option value="Mato Grosso">Mato Grosso</option>
              <option value="Minas Gerais">Minas Gerais</option>
              <option value="Pará">Pará</option>
              <option value="Paraíba">Paraíba</option>
              <option value="Paraná">Paraná</option>
              <option value="Pernambuco">Pernambuco</option>
              <option value="Piauí">Piauí</option>
              <option value="Rio de Janeiro">Rio de Janeiro</option>
              <option value="Rio Grande do Norte">Rio Grande do Norte</option>
              <option value="Rio Grande do Sul">Rio Grande do Sul</option>
              <option value="Rondônia">Rondônia</option>
              <option value="Roraima">Roraima</option>
              <option value="Santa Catarina">Santa Catarina</option>
              <option value="São Paulo">São Paulo</option>
              <option value="Sergipe">Sergipe</option>
              <option value="Tocantins">Tocantins</option>
            </select>
            <br /><br />

            <label for="city">Cidade:</label>
            <input type="text" id="city" name="userCity" required />
          </fieldset>

          <fieldset>
            <legend>Hábitos</legend>

            <p>Redes Sociais:</p>

            <input
              type="checkbox"
              id="instagram"
              name="social"
              value="instagram"
            />
            <label for="instagram">Instagram</label>
            <br />
            <input
              type="checkbox"
              id="facebook"
              name="social"
              value="facebook"
            />
            <label for="facebook">Facebook</label>
            <br />
            <input
              type="checkbox"
              id="linkedin"
              name="social"
              value="linkedin"
            />
            <label for="linkedin">Linkedin</label>
            <br />
            <input type="checkbox" id="x" name="social" value="x" />
            <label for="x">X</label>
            <br /><br />

            <label for="musicGenres">Gêneros de Músicas:</label>
            <input
              type="text"
              id="musicGenres"
              name="userMusicGenres"
              list="musicList"
            />
            <datalist id="musicList">
              <option value="Rock"></option>
              <option value="Pop"></option>
              <option value="Reggae"></option>
              <option value="Hip-Hop"></option>
              <option value="Eletrônica"></option>
              <option value="Samba"></option>
              <option value="Funk"></option>
              <option value="Jazz"></option>
            </datalist>
            <br /><br />

            <label for="favoriteColor">Cor Favorita:</label>
            <input type="color" id="favoriteColor" name="userFavoriteColor" />
          </fieldset>
          <br />

          <fieldset>
            <legend>Opiniões</legend>
            <p>O que você pensa sobre o meu serviço?</p>
            <input type="radio" name="satisfaction" id="excellent" />
            <label for="excellent">Excelente</label><br />
            <input type="radio" name="satisfaction" id="good" />
            <label for="good">Boa</label><br />
            <input type="radio" name="satisfaction" id="regular" />
            <label for="regular">Regular</label><br />
            <input type="radio" name="satisfaction" id="bad" />
            <label for="bad">Ruim</label><br /><br />

            <label for="comments">Comentário:</label><br />
            <textarea
              id="comments"
              name="userComments"
              rows="4"
              cols="50"
              placeholder="Escreva aqui..."
            ></textarea>
          </fieldset>
          <br />

          <fieldset>
            <legend>Confirmações</legend>
            <input
              type="checkbox"
              name="confirmation"
              id="confirmation"
              required
            />
            <label for="confirmation">Eu aceito participar da pesquisa</label>
            <input type="checkbox" name="userGetResult" id="getResult" />
            <label for="getResult">Desejo receber o resultado por e-mail</label>
          </fieldset>

          <input type="submit" value="Enviar" />
          <input type="reset" value="Limpar" />
        </form>
      </section>
    </main>
  </body>
</html>
